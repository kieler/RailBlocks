name: release

on:
  release:
    types: [published]
jobs:
  bundle-release:
    name: "Bundle with KiCo jar and attach artifacts to release"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}
      - uses: actions/setup-node@v6
